# Render Blueprint — https://render.com/docs/infrastructure-as-code
#
# Existing service created manually? Set in Dashboard → Settings:
#   Build:  npm install && npm run build -w orchestrator-studio
#   Start:  npm start
# Never use: node demo-haiku.ts / ad-hoc TS entry — use npm start (Orchestrator Studio).
#
# After first connect, set OPENAI_API_KEY in the dashboard if you need server-side demo runs.

services:
  - type: web
    name: orchestrator-studio
    runtime: node
    plan: free
    buildCommand: npm install && npm run build -w orchestrator-studio
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TRUST_PROXY
        value: "1"
      - key: COOKIE_SECRET
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
